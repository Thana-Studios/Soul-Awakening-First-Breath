<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Awakening | First Breath</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <aside id="side-menu">
        <div class="menu-inner">
            <h3 class="menu-title">The Inner Eye</h3>
            <p class="menu-sub">Soul Statistics</p>
            <ul id="extra-stats" class="stat-list"></ul>
            <button class="util-btn" onclick="toggleMenu()" style="margin-top: 40px;">Close Archive</button>
        </div>
    </aside>

    <div id="game-container">
        <aside id="status-panel">
            <div class="brand-header">
                <span class="studio-name">Thana Studios</span>
                <h2 class="game-title">Soul Awakening</h2>
            </div>

            <div class="stat-group">
                <label>Current Realm</label>
                <div id="realm-display" class="value gold-text">Mortal Coil</div>
            </div>

            <div class="gauges">
                <div class="stat-group">
                    <div class="label-row">
                        <label>Qi Concentration</label>
                        <span id="qi-count">0 / 100</span>
                    </div>
                    <div class="bar-bg"><div id="qi-fill" class="bar-fill"></div></div>
                </div>

                <div class="stat-group">
                    <div class="label-row">
                        <label>Natural Lifespan</label>
                        <span id="age-count">16 / 80 Years</span>
                    </div>
                    <div class="bar-bg"><div id="age-fill" class="bar-fill age"></div></div>
                    <div id="time-countdown" class="timer-display">Next Year In: 5:00</div>
                </div>
            </div>

            <button class="menu-trigger-btn" onclick="toggleMenu()">Expand Inner Eye</button>

            <div class="footer-links">
                <button class="util-btn" onclick="location.reload()">Reincarnate</button>
                <a href="https://thana-studios.github.io/" class="back-link">Return to Studio</a>
            </div>
        </aside>

        <main id="log-container">
            <div class="log-entry system">The clock of the heavens has begun to tick. Cultivate before your time expires.</div>
        </main>

        <nav id="action-bar">
            <button class="action-btn" onclick="meditate()">Meditate</button>
            <button class="action-btn" onclick="explore()">Explore</button>
            <button class="action-btn breakthrough" onclick="breakthrough()">Attempt Breakthrough</button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
