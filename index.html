<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Awakening: First Breath | Thana Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="status-panel">
        <div class="stat-box">Root: <span id="p-root" class="stat">Unknown</span></div>
        <div class="stat-box">Realm: <span id="p-realm" class="stat">Mortal</span></div>
        <div class="stat-box">Qi: <span id="p-qi" class="stat">0</span></div>
    </div>

    <div id="log-container">
        <div id="log">
            <div class="log-entry">The darkness fades. You feel a sudden warmth as your soul anchors itself to a new vessel...</div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-awaken" onclick="awaken()">Awaken Soul</button>
        
        <button id="btn-cultivate" onclick="cultivate()" style="display:none;">Meditate</button>
        <button id="btn-explore" onclick="explore()" style="display:none;">Explore</button>
        <button id="btn-breakthrough" onclick="breakthrough()" style="display:none;">Breakthrough</button>
    </div>

    <div id="footer-controls">
        <button class="util-btn" onclick="saveGame()">Manual Save</button>
        <button class="util-btn reset" onclick="resetGame()">Reset Karma</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
